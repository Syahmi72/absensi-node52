<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Absensi Node 52</title>
    <style>
        body {
            background-color: #050a12;
            color: #e2f1f8;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #09111e;
            border: 1px solid #00f0ff;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.15);
            width: 80%;
            max-width: 400px;
        }
        h2 { 
            color: #00f0ff; 
            letter-spacing: 2px; 
            margin-bottom: 5px;
        }
        p {
            color: #7db9d3;
            font-size: 12px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }
        input {
            padding: 12px;
            margin-bottom: 20px;
            width: 85%;
            background: #0f202e;
            border: 1px solid #14354a;
            color: #00f0ff;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            text-align: center;
        }
        input:focus {
            outline: none;
            border-color: #00f0ff;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }
        button {
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid #00f0ff;
            color: #00f0ff;
            padding: 12px 25px;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            width: 90%;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }
        button:hover:not(:disabled) {
            background: #00f0ff;
            color: #09111e;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.6);
        }
        /* Style saat tombol dimatikan setelah berhasil absen */
        button:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>ATTENDANCE PORTAL</h2>
        <p>SMART OFFICE &middot; NODE #52</p>
        
        <input type="text" id="namaPegawai" placeholder="MASUKKAN NAMA ANDA">
        <br>
        <button id="btnAbsen" onclick="kirimAbsen()">CLOCK-IN SEKARANG</button>
    </div>

    <script>
        function kirimAbsen() {
            const namaInput = document.getElementById('namaPegawai');
            const tombol = document.getElementById('btnAbsen');
            const nama = namaInput.value;
            
            if (!nama) {
                alert("Identitas tidak boleh kosong!");
                return;
            }

            // Ganti tombol jadi mode loading agar tidak diklik 2x
            tombol.disabled = true;
            tombol.innerText = "MENGIRIM...";

            // --- GANTI BAGIAN INI ---
            const token = 'u5tid2yr50zi2izborkp'; 
            // ------------------------

            const url = `https://thingsboard.cloud/api/v1/${token}/telemetry`;

            const payload = {
                "attendance_name": nama,
                "attendance_status": "Hadir",
                "timestamp": new Date().toLocaleString('id-ID')
            };

            fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'text/plain' // Tetap text/plain buat hindari CORS
                },
                body: JSON.stringify(payload)
            })
            .then(response => {
                // Hapus if(response.ok) agar otomatis sukses saat fetch berhasil menembus CORS
                
                // Munculkan notif sesuai request
                alert("TER ABSEN"); 
                
                // Kunci input dan ubah tampilan tombol permanen
                namaInput.disabled = true;
                tombol.innerText = "✅ TER ABSEN";
                tombol.style.background = "#00ff88"; // Hijau neon
                tombol.style.color = "#09111e";
                tombol.style.borderColor = "#00ff88";
            })
            .catch(error => {
                console.error('Error:', error);
                alert("Terjadi kesalahan jaringan.");
                tombol.disabled = false;
                tombol.innerText = "CLOCK-IN SEKARANG";
            });
        }
    </script>
</body>
</html>
